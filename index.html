function loadState(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function saveState(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
// ── Date helpers ──
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function getDateKey(d) { return d.toISOString().split("T")[0]; }
function getDaysInRange(s, e) {
  const days = [], d = new Date(s);
  while (d <= e) { days.push(getDateKey(d)); d.setDate(d.getDate()+1); }
  return days;
}
function getToday() { return getDateKey(new Date()); }
function getWeekDates() {
  const t = new Date(), day = t.getDay(), m = new Date(t);
  m.setDate(t.getDate() - ((day+6)%7));
  return getDaysInRange(m, t);
}
function getMondayOfWeek(ds) {
  const d = new Date(ds+"T12:00:00"), day = d.getDay(), m = new Date(d);
  m.setDate(d.getDate() - ((day+6)%7));
  return getDateKey(m);
}
function isMidWeek() { const d = new Date().getDay(); return d===3||d===4; }
function calcStreak(comp, hid, freq) {
  if (freq === "weekly") {
    let s = 0, d = new Date(), ck = getMondayOfWeek(getDateKey(d));
    let wd = getDaysInRange(new Date(ck+"T12:00:00"), new Date(Math.min(new Date(ck+"T12:00:00").getTime()+6*864e5,Date.now())));
    if (wd.some(x=>(comp[x]||[]).includes(hid))) s++;
    let ws = new Date(ck+"T12:00:00"); ws.setDate(ws.getDate()-7);
    while(true) {
      const ww = getDaysInRange(ws, new Date(ws.getTime()+6*864e5));
      if (ww.some(x=>(comp[x]||[]).includes(hid))) { s++; ws.setDate(ws.getDate()-7); }
      else break;
    }
    return s;
  }
  let s = 0, d = new Date();
  while(true) { const k = getDateKey(d); if((comp[k]||[]).includes(hid)){s++;d.setDate(d.getDate()-1);}else break; }
  return s;
}
function calcBestStreak(comp, hid) {
  const ad = Object.keys(comp).sort();
  if(!ad.length) return 0;
  let best=0, cur=0, d=new Date(ad[0]), e=new Date(ad[ad.length-1]);
  while(d<=e) { const k=getDateKey(d); if((comp[k]||[]).includes(hid)){cur++;best=Math.max(best,cur);}else cur=0; d.setDate(d.getDate()+1); }
  return best;
}
function getWeeklyScores(comp, habits, n=8) {
  const weeks=[], t=new Date();
  for(let w=n-1;w>=0;w--) {
    const we=new Date(t); we.setDate(t.getDate()-w*7);
    const mk=getMondayOfWeek(getDateKey(we)), mon=new Date(mk+"T12:00:00"), sun=new Date(mon); sun.setDate(mon.getDate()+6);
    const days=getDaysInRange(mon, new Date(Math.min(sun.getTime(),Date.now())));
    let dd=0,dt=0; days.forEach(d=>{habits.daily.forEach(h=>{dt++;if((comp[d]||[]).includes(h.id))dd++;});});
    let wd=0; habits.weekly.forEach(h=>{if(days.some(d=>(comp[d]||[]).includes(h.id)))wd++;});
    const wt=habits.weekly.length, total=dd+wd, possible=dt+wt;
    const score=possible>0?Math.round((total/possible)*100):0;
    weeks.push({label:mon.toLocaleDateString("en-US",{month:"short",day:"numeric"}),score,mondayKey:mk});
  }
  return weeks;
}
function calcStreakHistory(comp, hid, freq, numDays=28) {
  const hist=[];
  if(freq==="daily") {
    const d=new Date();
    for(let i=numDays-1;i>=0;i--) { const dt=new Date(d); dt.setDate(d.getDate()-i); const k=getDateKey(dt); hist.push({date:k,done:(comp[k]||[]).includes(hid)}); }
  } else {
    const nw=Math.floor(numDays/7), d=new Date();
    for(let w=nw-1;w>=0;w--) {
      const we=new Date(d); we.setDate(d.getDate()-w*7);
      const mk=getMondayOfWeek(getDateKey(we)), mon=new Date(mk+"T12:00:00"), sun=new Date(mon); sun.setDate(mon.getDate()+6);
      const days=getDaysInRange(mon,new Date(Math.min(sun.getTime(),Date.now())));
      hist.push({date:mk,done:days.some(x=>(comp[x]||[]).includes(hid))});
    }
  }
  return hist;
}
function generateHeatmapData(comp, hid) {
  const t=new Date(), s=new Date(t); s.setDate(t.getDate()-90);
  const weeks=[]; let week=[], d=new Date(s), sd=(d.getDay()+6)%7;
  for(let i=0;i<sd;i++) week.push(null);
  while(d<=t) { const k=getDateKey(d); week.push({date:k,completed:(comp[k]||[]).includes(hid)}); if(week.length===7){weeks.push(week);week=[];} d.setDate(d.getDate()+1); }
  if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}
  return weeks;
}
